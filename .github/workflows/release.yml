name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  verify:
    name: Verify before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libgl1-mesa-dev
      - name: Check tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TAG="${TAG%%-*}"   # ignore le suffixe pré-release (-rc/-beta) pour la comparaison
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "Tag $TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo package --all-features

  publish-crate:
    name: Publish to crates.io
    needs: verify
    # Pas de publish sur les pré-releases (v*-rc/-beta) : un publish crates.io est
    # définitif (on ne peut que « yank »). Gaté au niveau du job pour qu'un tag
    # pré-release ne déclenche même pas de demande d'approbation.
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      contents: read
      id-token: write        # nécessaire pour demander le jeton OIDC à GitHub
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libgl1-mesa-dev
      # Trusted Publishing : aucun secret longue durée. GitHub atteste l'identité
      # du workflow (repo + fichier + environnement), crates.io vérifie cette
      # attestation contre la config enregistrée et émet un jeton éphémère,
      # révoqué automatiquement en fin de job.
      - name: Get a temporary crates.io token (OIDC)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --all-features

  github-release:
    name: GitHub release
    needs: [verify, publish-crate]
    # publish-crate est volontairement skippé sur les pré-releases : la release
    # GitHub doit quand même se faire. On exige donc « verify OK » et « publish
    # pas en échec » (skipped compris).
    if: ${{ always() && needs.verify.result == 'success' && needs.publish-crate.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Generate release notes
        id: notes
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..${GITHUB_REF_NAME}"
            echo "Generating notes for $RANGE"
          else
            RANGE="${GITHUB_REF_NAME}"
            echo "First release — including all commits"
          fi
          {
            echo "notes<<EOF"
            git log --pretty=format:'- %s (%h)' "$RANGE"
            echo
            echo
            echo "Published to [crates.io](https://crates.io/crates/egui-rotate/${GITHUB_REF_NAME#v})."
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
