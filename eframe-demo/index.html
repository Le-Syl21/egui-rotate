<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>egui-rotate — eframe demo</title>

    <!-- Trunk builds the Rust crate to wasm and injects the loader.
         `#[wasm_bindgen(start)]` in lib.rs auto-runs on load. -->
    <link data-trunk rel="rust" data-wasm-opt="2" />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d0e12;
        overflow: hidden;
      }
      /* egui's canvas fills the page. */
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="the_canvas_id"></canvas>
  </body>
</html>
